name: Build program

on:
  push:
    branches: [ "main" ]
    paths:
      - para_bulkupdate.py
      - pyproject.toml
      - uv.lock

jobs:
  build:
   strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

   runs-on: ${{ matrix.os }}

   steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version-file: ".python-version"

    - name: Setup uv
      uses: astral-sh/setup-uv@v5.3.0
      with:
        enable-cache: true

    - name: Install Dependencies
      run: |
        uv sync
        uv pip freeze > requirements.txt
        cat requirements.txt
        pip install -r requirements.txt
        pip list

    - name: Build Executable with Nuitka
      uses: Nuitka/Nuitka-Action@main
      with:
         nuitka-version: main
         script-name: para_bulkupdate.py
         mode: onefile
         disable-console: true
         include-package: PyQt6
         enable-plugins: pyqt6

    - name: Smoke test binary (Linux)
      if: runner.os == 'Linux'
      run: |
        bin=$(ls build/*.bin 2>/dev/null | head -1)
        test -n "$bin" || (echo "Binary not found" && exit 1)
        test -f "$bin"  || (echo "Binary file missing" && exit 1)
        chmod +x "$bin"
        size=$(stat -c%s "$bin")
        echo "Binary size: ${size} bytes"
        test "$size" -gt 1000000 || (echo "Binary too small — build may have failed" && exit 1)

    - name: Smoke test binary (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $exe = Get-ChildItem build\*.exe | Select-Object -First 1
        if (-not $exe) { Write-Error "EXE not found"; exit 1 }
        $size = $exe.Length
        Write-Host "Binary size: $size bytes"
        if ($size -lt 1000000) { Write-Error "EXE too small — build may have failed"; exit 1 }

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
         name: ${{ runner.os }} Build
         path: |
            build/*.exe
            build/*.bin
